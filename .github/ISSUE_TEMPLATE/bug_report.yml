name: Bug report
description: Report something that is broken or confusing.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please do not include API keys, private prompts, or private images.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the problem in plain language.
      placeholder: The app failed when I tried to...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the shortest steps that trigger the problem.
      placeholder: |
        1. Open...
        2. Click...
        3. See...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: I expected...
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version
      placeholder: 0.1.0
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Error message or logs
      description: Remove API keys, private prompts, and private file paths before sharing.
      render: text
    validations:
      required: false
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed API keys and private content from this report.
          required: true
